name: Gauntlet

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: ${{ matrix.group }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - policy
          - install
          - lifecycle
          - prd
          - orchestration
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check install manifest
        if: matrix.group == 'policy'
        run: python3 scripts/generate-install-manifest.py --check

      - name: Run ${{ matrix.group }} checks
        run: python3 scripts/check-gauntlet-workflow.py --group "${{ matrix.group }}"

  gauntlet:
    if: always()
    needs:
      - checks
    runs-on: ubuntu-latest
    steps:
      - name: Require every check group
        run: test "${{ needs.checks.result }}" = "success"
