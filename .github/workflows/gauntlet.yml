name: Gauntlet

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  gauntlet:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Gauntlet workflow checks
        run: python3 scripts/check-gauntlet-workflow.py
